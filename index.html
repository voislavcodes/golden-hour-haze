<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Golden Hour Haze</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
    canvas#ghz {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
    #fallback {
      display: none;
      position: fixed;
      inset: 0;
      background: #1a1a2e;
      color: #e0d0c0;
      font-family: system-ui, sans-serif;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
    }
    #fallback h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    #fallback p { font-size: 1rem; opacity: 0.7; max-width: 30rem; }
  </style>
</head>
<body>
  <canvas id="ghz"></canvas>
  <ghz-canvas-overlay></ghz-canvas-overlay>
  <ghz-mood-selector></ghz-mood-selector>
  <ghz-toolbar></ghz-toolbar>
  <ghz-palette-panel></ghz-palette-panel>
  <ghz-thinners-slider></ghz-thinners-slider>
  <ghz-load-slider></ghz-load-slider>
  <ghz-surface-pad></ghz-surface-pad>
  <ghz-export-button></ghz-export-button>
  <div id="fallback">
    <div>
      <h1>Golden Hour Haze requires WebGPU</h1>
      <p>Your browser doesn't support WebGPU yet. Please use Chrome 113+, Edge 113+, or Safari 18+ to experience this app.</p>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
